name: ContextControl Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows x64 portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build release artifacts
        shell: pwsh
        run: ./packaging/Publish-ContextControlRelease.ps1 -Configuration Release -RuntimeIdentifier win-x64 -Version "${{ github.ref_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ContextControl-win-x64
          path: |
            .tmp/release/ContextControl-win-x64.zip
            .tmp/release/ContextControl-win-x64.zip.sha256.txt
            .tmp/release/ContextControl-win-x64-Setup.exe
            .tmp/release/ContextControl-win-x64-Setup.exe.sha256.txt

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "ContextControl $tag" --notes "Portable Windows x64 release. Extract the zip and run ContextControl.Workbench.exe or Install-ContextControl.ps1."
          }
          gh release upload $tag .tmp/release/ContextControl-win-x64.zip .tmp/release/ContextControl-win-x64.zip.sha256.txt .tmp/release/ContextControl-win-x64-Setup.exe .tmp/release/ContextControl-win-x64-Setup.exe.sha256.txt --clobber
