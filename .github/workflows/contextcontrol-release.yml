name: ContextControl Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows x64 portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build release artifacts
        shell: pwsh
        run: ./packaging/Publish-ContextControlRelease.ps1 -Configuration Release -RuntimeIdentifier win-x64 -Version "${{ github.ref_name }}"

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ github.ref_name }}'
          $repo = '${{ github.repository }}'
          $notes = 'Portable Windows x64 release. Extract the zip and run ContextControl.Workbench.exe, or run ContextControl-win-x64-Setup.exe for the installer.'
          $apiBase = "https://api.github.com/repos/$repo"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent' = 'contextcontrol-release'
          }

          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory)]
              [scriptblock]$Action
            )

            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                return & $Action
              }
              catch {
                if ($attempt -eq 3) {
                  throw
                }

                Start-Sleep -Seconds (10 * $attempt)
              }
            }
          }

          try {
            $release = Invoke-RestMethod -Headers $headers -Uri "$apiBase/releases/tags/$tag"
          }
          catch {
            $statusCode = [int]$_.Exception.Response.StatusCode
            if ($statusCode -ne 404) {
              throw
            }

            $body = @{
              tag_name = $tag
              target_commitish = '${{ github.sha }}'
              name = "ContextControl $tag"
              body = $notes
              draft = $false
              prerelease = $false
            } | ConvertTo-Json

            $release = Invoke-WithRetry -Action {
              Invoke-RestMethod -Method Post -Headers $headers -Uri "$apiBase/releases" -Body $body -ContentType 'application/json'
            }
          }

          $installerPayload = '.tmp/release/ContextControl-win-x64-Setup.payload'
          Copy-Item -LiteralPath '.tmp/release/ContextControl-win-x64-Setup.exe' -Destination $installerPayload -Force

          $assets = @(
            @{ Path = $installerPayload; Name = 'ContextControl-win-x64-Setup.exe'; ContentType = 'application/octet-stream' },
            @{ Path = '.tmp/release/ContextControl-win-x64-Setup.exe.sha256.txt'; Name = 'ContextControl-win-x64-Setup.exe.sha256.txt'; ContentType = 'text/plain' },
            @{ Path = '.tmp/release/ContextControl-win-x64.zip'; Name = 'ContextControl-win-x64.zip'; ContentType = 'application/zip' },
            @{ Path = '.tmp/release/ContextControl-win-x64.zip.sha256.txt'; Name = 'ContextControl-win-x64.zip.sha256.txt'; ContentType = 'text/plain' }
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset.Path)) {
              Get-ChildItem -LiteralPath '.tmp/release' -Force | Format-Table Name,Length,LastWriteTime
              throw "Missing release asset: $($asset.Path)"
            }

            $existing = @($release.assets | Where-Object { $_.name -eq $asset.Name })
            foreach ($oldAsset in $existing) {
              Invoke-WithRetry -Action {
                Invoke-RestMethod -Method Delete -Headers $headers -Uri "$apiBase/releases/assets/$($oldAsset.id)"
              } | Out-Null
            }

            $escapedName = [System.Uri]::EscapeDataString($asset.Name)
            $uploadUrl = $release.upload_url -replace '\{\?name,label\}', "?name=$escapedName"
            Invoke-WithRetry -Action {
              Invoke-RestMethod -Method Post -Headers $headers -Uri $uploadUrl -ContentType $asset.ContentType -InFile $asset.Path
            } | Out-Null
            $release = Invoke-RestMethod -Headers $headers -Uri "$apiBase/releases/tags/$tag"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ContextControl-win-x64
          path: |
            .tmp/release/ContextControl-win-x64.zip
            .tmp/release/ContextControl-win-x64.zip.sha256.txt
            .tmp/release/ContextControl-win-x64-Setup.exe
            .tmp/release/ContextControl-win-x64-Setup.exe.sha256.txt
